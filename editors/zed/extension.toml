id = "ember"
name = "Ember"
version = "0.1.0"
schema_version = 1
authors = ["Ember"]
description = "Ember language support for Zed: syntax highlighting plus diagnostics, hover, go-to-definition, completion, and document symbols via the in-tree emberc language server."
repository = "https://github.com/kmcnally5/ember-lang"

# The tree-sitter grammar (syntax highlighting + outline). Zed builds it from a git repository at a
# pinned revision — cloned + compiled to wasm ONCE at extension install, then cached locally (no
# per-edit network). The grammar is its own repo: github.com/kmcnally5/tree-sitter-ember. REGEN NOTE:
# after editing grammar.js, re-run `npx tree-sitter-cli generate`, commit + push the grammar repo,
# then update `rev` here to the new commit SHA.
[grammars.ember]
repository = "https://github.com/kmcnally5/tree-sitter-ember"
rev = "254c5a042d7512a660210a65d9f42a23458a4f41"

# The language server: launched by src/lib.rs (language_server_command). The id here ("ember") is the
# LanguageServerId the Rust code receives; `languages` matches languages/ember/config.toml's `name`.
[language_servers.ember]
name = "Ember Language Server"
languages = ["Ember"]

[language_servers.ember.language_ids]
"Ember" = "ember"
