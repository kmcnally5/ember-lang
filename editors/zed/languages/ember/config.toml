name = "Ember"
grammar = "ember"
path_suffixes = ["em"]
line_comments = ["// "]
autoclose_before = ";:.,=}])>"
tab_size = 4
hard_tabs = false

# Mirrors editors/vscode/language-configuration.json (brackets + string auto-close).
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
]
